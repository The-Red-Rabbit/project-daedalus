<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daedalus Brücke</title>
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--bg-void); color: var(--text-primary); font-family: var(--font-ui); overflow: hidden; }
  #stage { position: relative; width: 100vw; height: 100vh; }
  #scene { display: block; width: 100%; height: 100%; }
  #overlay { position: absolute; inset: 0; pointer-events: none; padding: 18px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
  .panel { background: var(--bg-panel); border: 1px solid var(--edge); border-radius: 4px; padding: 12px 14px; pointer-events: auto; }
  .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .values { display: flex; gap: 18px; }
  .value { min-width: 120px; }
  .value .label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .bar { height: 8px; background: var(--bg-void); border: 1px solid var(--edge); margin-top: 4px; }
  .bar > div { height: 100%; width: 0; }
  .stations { display: flex; gap: 10px; flex-wrap: wrap; max-width: 60%; }
  .station { min-width: 120px; }
  .station .name { font-weight: 500; }
  .station .status { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .bottombar { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; }
  .join { text-align: right; font-size: 13px; color: var(--text-muted); }
  .join b { color: var(--accent-cyan); }
  .leitstand { display: flex; gap: 10px; align-items: center; }
  button { font-family: var(--font-ui); font-size: 13px; color: var(--text-primary); background: var(--bg-void); border: 1px solid var(--edge); border-radius: 3px; padding: 7px 12px; cursor: pointer; }
  button:hover { border-color: var(--accent-orange); }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="scene"></canvas>
    <div id="overlay">
      <div class="topbar">
        <div class="panel">
          <div style="font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted);">Daedalus</div>
          <div id="sector" style="font-size:20px; font-weight:500;">Sektor 1</div>
        </div>
        <div class="panel values">
          <div class="value"><div class="label">Hülle</div><div class="bar"><div id="v-huelle" style="background:var(--status-stable);"></div></div></div>
          <div class="value"><div class="label">Energie</div><div class="bar"><div id="v-energie" style="background:var(--accent-yellow);"></div></div></div>
          <div class="value"><div class="label">Fortschritt</div><div class="bar"><div id="v-fortschritt" style="background:var(--accent-cyan);"></div></div></div>
        </div>
      </div>

      <div class="bottombar">
        <div class="panel stations" id="stations"></div>
        <div style="display:flex; flex-direction:column; gap:10px; align-items:flex-end;">
          <div class="panel leitstand">
            <span style="font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted);">Leitstand</span>
            <button id="btn-event">Asteroidenwelle</button>
            <button id="btn-audio">Ton an</button>
          </div>
          <div class="panel join">Beitritt im WLAN: <b id="join-url">/controller</b></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/host/host.js"></script>
</body>
</html>
